services:
    web:
        build: .
        command: ["gunicorn", "-b", "0.0.0.0:5000", "src.wsgi:app"]
        volumes:
            - data_volume:/app/data
        ports:
            - "5000:5000"
        env_file:
            - .env
    build_worker:
        build: .
        command: ["python", "-m", "src.build_worker"]
        volumes:
            - data_volume:/app/data
        env_file:
            - .env
        stop_grace_period: 30s
    cleanup_worker:
        build: .
        profiles:
            - manual
        command: ["python", "-m", "src.cleanup_worker"]
        volumes:
            - data_volume:/app/data
        env_file:
            - .env
    root_passwd:
        build: .
        profiles:
            - manual
        entrypoint: ["python", "scripts/root_passwd.py"]
        volumes:
            - data_volume:/app/data
            - ./scripts:/app/scripts:ro
        env_file:
            - .env
    build_static:
        build: .
        profiles:
            - manual
        entrypoint: ["python", "scripts/build_static.py"]
        volumes:
            - ./src/static:/app/src/static
            - ./scripts:/app/scripts:ro
volumes:
    data_volume:
